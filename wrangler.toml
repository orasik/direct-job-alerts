name = "directjobs-cron"
main = "src/index.ts"
compatibility_date = "2026-01-01"

[observability]
enabled = true

# Runs once every 24 hours at 00:00 UTC.
[triggers]
crons = ["0 0 * * *"]

# KV namespace used to remember already-notified job URLs (dedup).
# Create it with:  npx wrangler kv namespace create SEEN_JOBS
# then paste the returned id below.
[[kv_namespaces]]
binding = "SEEN_JOBS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
